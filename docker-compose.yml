services:
  # Ollama LLM Service
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   pull_policy: always
  #   tty: true
  #   networks:
  #     - app-network

  # Jaeger for trace visualization
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686" # Jaeger UI
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - app-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  # Redis for Caching and Seat Locking
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network

  nestjs:
    build:
      context: ./nestjs
      dockerfile: Dockerfile
    container_name: nestjs
    ports:
      - "8080:3000"
    environment:
      - PORT=3000
      - OTEL_SERVICE_NAME=nestjs
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4318/v1/traces
      - DATABASE_URL=postgresql://admin:password@postgres:5432/mydb?schema=public
    depends_on:
      - jaeger
      - postgres
      - redis
    networks:
      - app-network
    mem_limit: 2G
    memswap_limit: 2G  # Equal to mem_limit disables swap
    mem_reservation: 1.6G  # 80% สำหรับระบบที่ต้องการ performance สูง อย่างเช่น E-Commerce
    cpus: '2.0'

volumes:
  ollama-data:
  postgres-data:
  redis-data:

networks:
  app-network:
    driver: bridge