services:
  # otel-collector
  # loki
  # prometheus
  # tempo

  # Jaeger for trace visualization
  # Alert (By Use-Case, Notify ให้ได้)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686" # Jaeger UI
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - app-network

  # PostgreSQL Database
  postgres:
    image: postgres:16 # --- CHANGED: Use the full postgres image, not alpine ---
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    # --- CORRECTED HEALTHCHECK ---
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis for Caching and Seat Locking
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  nestjs:
    build:
      context: ./nestjs
      dockerfile: Dockerfile
    container_name: nestjs
    ports:
      - "8080:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
      - OTEL_SERVICE_NAME=nestjs
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4318/v1/traces
      - DATABASE_URL=postgresql://admin:password@postgres:5432/mydb?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy # Changed to healthy to be more robust
      jaeger:
        condition: service_started
    networks:
      - app-network
    mem_limit: 2G
    memswap_limit: 2G # (Disk)
    mem_reservation: 1.6G # (1.6 GB)
    cpus: '2.0'

volumes:
  postgres-data:
  redis-data:

networks:
  app-network:
    driver: bridge