services:
  # otel-collector
  # loki
  # prometheus
  # tempo

  # Jaeger for trace visualization
  # Alert (By Use-Case, Notify ให้ได้)
  jaeger:
    image:  jaegertracing/jaeger:2.11.0
    container_name: jaeger
    ports:
      - "16686:16686" # Jaeger UI
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - app-network

  # PostgreSQL Database
  postgres:
    image: postgres:16 # --- CHANGED: Use the full postgres image, not alpine ---
    container_name: postgres
    ports:
      - "5432:5432"
    command: postgres -c max_connections=200 # default is 100
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    # --- CORRECTED HEALTHCHECK ---
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis for Caching and Seat Locking
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # nginx:
  #   image: nginx:alpine
  #   container_name: nginx
  #   ports:
  #     - "8080:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - nestjs
  #   networks:
  #     - app-network

  nestjs:
    build:
      context: ./nestjs
      dockerfile: Dockerfile
    container_name: nestjs 
    ports:
      - "8080:3000"
    # deploy:
    #   replicas: 1 # 3 for load balancing
    environment:
      - PORT=3000
      - OTEL_SERVICE_NAME=nestjs
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4318/v1/traces
      - DATABASE_URL=postgresql://admin:password@postgres:5432/mydb?schema=public&connection_limit=100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy # Changed to healthy to be more robust
      jaeger:
        condition: service_started
    networks:
      - app-network
    mem_limit: 1G
    memswap_limit: 1G # (Disk)
    mem_reservation: 0.8G # (1.6 GB)
    cpus: '1.0' # Limit to 1 CPU

volumes:
  postgres-data:
  redis-data:

networks:
  app-network:
    driver: bridge